<!DOCTYPE html>
<html lang="en">
<head>
<meta name="theme-color" content="#0B1120">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bluohm</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- Theme colors for mobile status bar -->
<meta name="theme-color" content="#0B1120" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body {
  background: linear-gradient(135deg,#0B1120,#020617);
  color: white;
  min-height: 100vh;
  font-family: system-ui;
  margin: 0;
}

/* Header */
.header {
  position: absolute;
  top: 0;
  width: 100%;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: bold;
  font-size: 1.3rem;
}

.menu-icon {
  cursor: pointer;
  transition: transform 0.2s;
  font-size: 1.5rem;
}

.menu-icon:hover {
  transform: scale(1.1);
}

.btn-signin {
  border: 1px solid white;
  color: white;
  padding: 6px 16px;
  border-radius: 8px;
  text-decoration: none;
}

.btn-signin:hover {
  background: white;
  color: black;
}

/* Hero Section */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
  padding: 20px 16px;
  padding-top: 100px;
}

.hero h1 {
  font-size: 2.8rem;
  font-weight: 700;
  margin-bottom: 16px;
}

.hero p {
  font-size: 1.1rem;
  opacity: 0.8;
  max-width: 600px;
  margin: 0 auto 20px;
}

/* Email Signup - stacked version, wider fields */
.email-box {
  max-width: 600px;
  width: 100%;
  margin: auto;
  background-color: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 12px;
}

.email-box input.form-control {
  width: 100%;
  padding: 10px 14px;
  font-size: 1rem;
  border-radius: 8px;
  border: none;
  margin-bottom: 8px;
  background-color: #ffffff;
  color: #000;
}

.email-box input.form-control::placeholder {
  color: #888;
}

.email-box .btn {
  width: 100%;
  padding: 10px 14px;
  font-weight: 600;
  border-radius: 8px;
  background-color: #4CAF50;
  border: none;
  color: white;
}

.email-box .btn:hover {
  background-color: #45a049;
}

/* Mobile adjustments */
@media(min-width:768px) {
  .hero h1 {
    font-size: 3.5rem;
  }
}
</style>

</head>

<body>

<!-- Header -->
<div class="header">
  <div class="menu-icon">
    <i class="bi bi-list"></i>
  </div>
  <div class="logo">Bluohm</div>
  <a href="{% url 'accounts:login' %}" class="btn-signin">
    Sign in
  </a>
</div>

<!-- Hero -->
<div class="hero">
  <h1>
    Find your next home<br>
    without the stress
  </h1>

  <p>
    Browse verified rentals, apartments, and property listings
    across Malawi — all in one place.
  </p>

  <div class="email-box">
    <form>
      <input
        type="email"
        class="form-control"
        placeholder="you@example.com"
        required
      >
      <a href="{% url 'accounts:register' %}" class="btn">
        Sign Up for Bluohm
      </a>
    </form>
  </div>
</div>

</body>
</html>

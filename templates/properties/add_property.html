<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Property | Bluohm</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
background:#0f172a;
color:white;
padding:20px;
}

.card {
background:#020617;
border:1px solid #334155;
color:white;
}

.form-control {
background:#020617;
border:1px solid #334155;
color:white;
}

.form-control:focus {
background:#020617;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h4 class="mb-4">Add Property</h4>

<div class="card p-4">

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">
<label>Title</label>
{{ form.title }}
</div>

<div class="mb-3">
<label>Description</label>
{{ form.description }}
</div>

<div class="mb-3">
<label>Price</label>
{{ form.price }}
</div>

<div class="mb-3">
<label>Location</label>
{{ form.location }}
</div>

<div class="row">

<div class="col-md-6 mb-3">
<label>Bedrooms</label>
{{ form.bedrooms }}
</div>

<div class="col-md-6 mb-3">
<label>Bathrooms</label>
{{ form.bathrooms }}
</div>

</div>

<div class="mb-3">

<label>Property Images</label>

<input 
type="file" 
name="images" 
multiple 
class="form-control">

</div>

<button class="btn btn-success w-100">

Add Property

</button>

</form>

</div>

</div>

</body>
</html>

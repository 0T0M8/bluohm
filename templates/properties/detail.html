{% extends 'base.html' %}
{% block content %}

<h2>{{ property.title }}</h2>
<p class="price">MWK {{ property.price }}</p>
<p>{{ property.description }}</p>

<div class="gallery">
    {% for img in property.images.all %}
    <img src="{{ img.image.url }}">
    {% endfor %}
</div>

<a href="{% url 'properties:marketplace' %}">⬅ Back to Marketplace</a>

{% endblock %}

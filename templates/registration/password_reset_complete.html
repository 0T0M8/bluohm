<!DOCTYPE html>
<html>
<head>
    <meta name="theme-color" content="#0B1120">
    <title>Bluohm | Password Reset Complete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; }
        .card-box { background: #1e293b; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .btn-primary { background: #38bdf8; border: none; }
        .btn-primary:hover { background: #0ea5e9; }
    </style>
</head>
<body>
<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="col-md-5">
        <div class="card-box text-center">
            <h2>Password Reset Complete</h2>
            <p>Your password has been successfully reset. You can now login with your new password.</p>
            <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-3">Login</a>
        </div>
    </div>
</div>
</body>
</html>

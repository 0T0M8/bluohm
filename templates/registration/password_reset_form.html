<!DOCTYPE html>
<html>
<head>
    <meta name="theme-color" content="#0B1120">

    <title>Bluohm | Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; }
        .card-box { background: #1e293b; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .btn-primary { background: #38bdf8; border: none; }
        .btn-primary:hover { background: #0ea5e9; }
    </style>
</head>
<body>
<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="col-md-5">
        <div class="card-box">
            <h2 class="text-center mb-4">Forgot Password</h2>
            <p class="text-center mb-3">Enter your email and we'll send you a reset link.</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-danger{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'accounts:password_reset' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
            </form>

            <hr>
            <p class="text-center">
                Remember your password? <a href="{% url 'accounts:login' %}">Login</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>

<!-- templates/messaging/chat.html -->

{% extends "base.html" %}

{% block content %}

<div class="container py-4">

<!-- Header -->
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">
        Chat about: <strong>{{ conversation.property.title }}</strong>
    </h5>
</div>

<!-- Chat Box -->
<div id="chat-box"
     class="border rounded p-3 mb-3 bg-white"
     style="height: 420px; overflow-y: auto;">

    {% for msg in messages %}
    <div class="mb-2 {% if msg.sender == request.user %}text-end{% endif %}">
        <div class="d-inline-block px-3 py-2 rounded
            {% if msg.sender == request.user %}
                bg-dark text-white
            {% else %}
                bg-light
            {% endif %}
        ">
            {{ msg.content }}
        </div>
    </div>
    {% endfor %}

</div>

<!-- Message Input -->
<form id="chat-form">
    {% csrf_token %}
    <div class="input-group">
        <input type="text"
               id="message-input"
               class="form-control"
               placeholder="Type a message..."
               autocomplete="off"
               required>
        <button class="btn btn-dark">Send</button>
    </div>
</form>

</div>

<!-- ============================= -->
<!-- REAL-TIME CHAT SCRIPT -->
<!-- ============================= -->

<script>
const form = document.getElementById("chat-form");
const input = document.getElementById("message-input");
const chatBox = document.getElementById("chat-box");

function getCSRFToken() {
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken'))
        ?.split('=')[1];
}

// SEND MESSAGE (AJAX)
form.addEventListener("submit", function(e) {
    e.preventDefault();

    const message = input.value.trim();
    if (!message) return;

    fetch("", {
        method: "POST",
        headers: {
            "X-CSRFToken": getCSRFToken(),
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `content=${encodeURIComponent(message)}`
    })
    .then(res => res.text())
    .then(() => {
        input.value = "";
        loadMessages();
    })
    .catch(err => console.error("Send failed:", err));
});

// LOAD MESSAGES (POLLING)
function loadMessages() {
    fetch("/messages/fetch/{{ conversation.id }}/")
    .then(res => res.json())
    .then(data => {
        let html = "";

        data.messages.forEach(msg => {
            html += `
            <div class="mb-2 ${msg.is_me ? 'text-end' : ''}">
                <div class="d-inline-block px-3 py-2 rounded
                    ${msg.is_me ? 'bg-dark text-white' : 'bg-light'}">
                    ${msg.content}
                </div>
            </div>
            `;
        });

        chatBox.innerHTML = html;
        chatBox.scrollTop = chatBox.scrollHeight;
    })
    .catch(err => console.error("Load failed:", err));
}

// INITIAL LOAD
loadMessages();

// POLLING EVERY 2s
setInterval(loadMessages, 2000);
</script>

{% endblock %}

<!-- templates/messaging/chat.html -->

{% extends "base.html" %}

{% block content %}

<div class="container py-4">

<h4 class="mb-3">
    Chat about: {{ conversation.property.title }}
</h4>

<div class="border rounded p-3 mb-3" style="height: 400px; overflow-y: auto;">

{% for msg in messages %}

<div class="mb-2 
{% if msg.sender == request.user %}text-end{% endif %}">

    <div class="d-inline-block p-2 rounded 
    {% if msg.sender == request.user %}
        bg-dark text-white
    {% else %}
        bg-light
    {% endif %}
    ">
        {{ msg.content }}
    </div>

</div>

{% endfor %}

</div>

<!-- Ajax Form Reloads Chat -->
<form id="chat-form">
    {% csrf_token %}
    <div class="input-group">
        <input type="text" id="message-input"
               class="form-control"
               placeholder="Type a message..." required>
        <button class="btn btn-dark">Send</button>
    </div>
</form>
</div>

<script>
const form = document.getElementById("chat-form");
const input = document.getElementById("message-input");
const chatBox = document.getElementById("chat-box");

function getCSRFToken() {
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken'))
        ?.split('=')[1];
}

form.addEventListener("submit", function(e) {
    e.preventDefault();

    fetch("", {
        method: "POST",
        headers: {
            "X-CSRFToken": getCSRFToken(),
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `content=${encodeURIComponent(input.value)}`
    })
    .then(res => res.text())
    .then(() => {
        // append message instantly
        const msgHTML = `
        <div class="mb-2 text-end">
            <div class="d-inline-block p-2 rounded bg-dark text-white">
                ${input.value}
            </div>
        </div>
        `;
        chatBox.innerHTML += msgHTML;

        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;
    });
});

function loadMessages() {
    fetch("/messages/fetch/{{ conversation.id }}/")
    .then(res => res.json())
    .then(data => {
        let html = "";

        data.messages.forEach(msg => {
            html += `
            <div class="mb-2 ${msg.is_me ? 'text-end' : ''}">
                <div class="d-inline-block p-2 rounded 
                    ${msg.is_me ? 'bg-dark text-white' : 'bg-light'}">
                    ${msg.content}
                </div>
            </div>
            `;
        });

        chatBox.innerHTML = html;
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

// refresh every 2 seconds
setInterval(loadMessages, 2000);

</script>

{% endblock %}

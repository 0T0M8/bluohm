<!DOCTYPE html>
<html>
<head>
    <title>Bluohm | Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .register-card {
            background: #1e293b;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .btn-primary {
            background: #38bdf8;
            border: none;
        }

        .btn-primary:hover {
            background: #0ea5e9;
        }
    </style>

</head>

<body>

<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
    
    <div class="col-md-5">
        
        <div class="register-card">
            
            <h2 class="text-center mb-4">Create Bluohm Account</h2>

            <!-- Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <input type="text" 
                           name="username" 
                           class="form-control"
                           placeholder="Username"
                           required>
                </div>

                <div class="mb-3">
                    <input type="email" 
                           name="email" 
                           class="form-control"
                           placeholder="Email"
                           required>
                </div>

                <div class="mb-3">
                    <input type="text" 
                           name="phone" 
                           class="form-control"
                           placeholder="Phone Number">
                </div>

                <div class="mb-3">
                    <input type="password" 
                           name="password" 
                           class="form-control"
                           placeholder="Password"
                           required>
                </div>

                <div class="mb-3">
                    <input type="password" 
                           name="confirm_password" 
                           class="form-control"
                           placeholder="Confirm Password"
                           required>
                </div>

                <div class="mb-3">
                    <select name="role" class="form-control">
                        <option value="tenant">Tenant</option>
                        <option value="landlord">Landlord</option>
                        <option value="agent">Agent</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Create Account
                </button>

            </form>

            <hr>

            <p class="text-center">
                Already have an account? 
                <a href="{% url 'accounts:login' %}">
                    Login
                </a>
            </p>

        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="theme-color" content="#0B1120">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bluohm | Register</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

/* Base */

body {
background: #0f172a;
color: white;
transition: background .25s ease, color .25s ease;
}

/* Theme Toggle */

.theme-toggle {
position: absolute;
top: 20px;
right: 20px;
z-index: 1000;
}

/* Auth Layout */

.auth-container {
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 20px;
}

.auth-wrapper {
width: 100%;
max-width: 420px;
}

.brand {
font-size: 28px;
font-weight: 700;
margin-bottom: 5px;
}

.subtitle {
color: #94a3b8;
margin-bottom: 25px;
}

/* Form */

.form-control {
background: #020617;
border: 1px solid #334155;
color: white;
padding: 12px;
}

.form-control:focus {
background: #020617;
border-color: #22c55e;
color: white;
box-shadow: none;
}

.form-select {
background: #020617;
border: 1px solid #334155;
color: white;
padding: 12px;
}

.form-select:focus {
background: #020617;
border-color: #22c55e;
color: white;
box-shadow: none;
}

/* Buttons */

.btn-success {
background: #22c55e;
border: none;
padding: 12px;
}

.btn-success:hover {
background: #16a34a;
}

/* Social Buttons */

.social-btn {
background: #020617;
border: 1px solid #334155;
color: white;
padding: 12px;
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
}

.social-btn:hover {
background: #020617;
}

.social-btn i {
font-size: 18px;
}

.divider {
text-align: center;
margin: 25px 0;
color: #94a3b8;
}

/* Light Mode */

.light-mode {
background: #f8fafc;
color: #020617;
}

.light-mode .subtitle {
color: #475569;
}

.light-mode .form-control,
.light-mode .form-select {
background: white;
color: black;
border: 1px solid #e2e8f0;
}

.light-mode .social-btn {
background: white;
color: black;
border: 1px solid #e2e8f0;
}

.light-mode .btn-outline-light {
color: black;
border-color: #cbd5e1;
}

</style>

</head>

<body>

<!-- Theme Toggle -->

<div class="theme-toggle">
<button class="btn btn-sm btn-outline-light" onclick="toggleTheme()">
<i class="bi bi-sun" id="themeIcon"></i>
</button>
</div>

<div class="auth-container">

<div class="auth-wrapper">

<div class="brand">Bluohm</div>
<div class="subtitle">Create your account</div>

<!-- Messages -->
{% if messages %}
{% for message in messages %}
<div class="alert alert-danger">
{{ message }}
</div>
{% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<input type="text"
name="username"
class="form-control"
placeholder="Username"
required>
</div>

<div class="mb-3">
<input type="email"
name="email"
class="form-control"
placeholder="Email"
required>
</div>

<div class="mb-3">
<select name="role" class="form-select" required>
<option value="">Select account type</option>
<option value="landlord">Landlord</option>
<option value="tenant">Tenant</option>
</select>
</div>

<div class="mb-3">
<input type="password"
name="password1"
class="form-control"
placeholder="Password"
required>
</div>

<div class="mb-3">
<input type="password"
name="password2"
class="form-control"
placeholder="Confirm password"
required>
</div>

<button class="btn btn-success w-100 mb-3">
Create account
</button>

</form>

<div class="divider">
or continue with
</div>

<button class="btn social-btn w-100 mb-2">
<i class="bi bi-google"></i>
Sign in with Google
</button>

<button class="btn social-btn w-100 mb-2">
<i class="bi bi-github"></i>
Sign in with Github
</button>

<button class="btn social-btn w-100 mb-2">
<i class="bi bi-apple"></i>
Sign in with Apple
</button>

<hr>

<p>
Already have an account?
<a href="{% url 'accounts:login' %}">
Sign in
</a>
</p>

</div>

</div>

<script>

function toggleTheme() {

document.body.classList.toggle("light-mode")

const icon = document.getElementById("themeIcon")

if(document.body.classList.contains("light-mode")) {

icon.classList.remove("bi-sun")
icon.classList.add("bi-moon")

localStorage.setItem("theme","light")

} else {

icon.classList.remove("bi-moon")
icon.classList.add("bi-sun")

localStorage.setItem("theme","dark")

}

}

document.addEventListener("DOMContentLoaded", () => {

const savedTheme = localStorage.getItem("theme")

if(savedTheme === "light") {

document.body.classList.add("light-mode")

document.getElementById("themeIcon")
.classList.replace("bi-sun","bi-moon")

}

})

</script>

</body>
</html>

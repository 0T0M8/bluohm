<!DOCTYPE html>
<html>
<head>
<meta name="theme-color" content="#0B1120">
<title>Bluohm | Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body {
    background: #0f172a;
    color: white;
}

.auth-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.auth-wrapper {
    width: 100%;
    max-width: 420px;
}

.brand {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 5px;
}

.subtitle {
    color: #94a3b8;
    margin-bottom: 25px;
}

.form-control {
    background: #020617;
    border: 1px solid #334155;
    color: white;
    padding: 12px;
}

.form-control:focus {
    background: #020617;
    border-color: #22c55e;
    color: white;
    box-shadow: none;
}

.btn-success {
    background: #22c55e;
    border: none;
    padding: 12px;
}

.btn-success:hover {
    background: #16a34a;
}

.social-btn {
    background: #020617;
    border: 1px solid #334155;
    color: white;
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.social-btn:hover {
    background: #020617;
    widtg: 22px;
    text-align: center;
}

.social-btn i {
    font-size: 18px;
    text-align: center;
}

.social-btn span {
    text-align: center;
}

.divider {
    text-align: center;
    margin: 25px 0;
    color: #94a3b8;
}

.divider {
    text-align: center;
    margin: 25px 0;
    color: #94a3b8;
}

.remember {
    font-size: 14px;
    color: #94a3b8;
}

</style>

</head>

<body>

<div class="auth-container">

<div class="auth-wrapper">

<div class="brand">Bluohm</div>
<div class="subtitle">Sign in to your account</div>

<!-- Messages -->
{% if messages %}
{% for message in messages %}
<div class="alert alert-danger">
{{ message }}
</div>
{% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<input type="email"
name="email"
class="form-control"
placeholder="Email"
required>
</div>

<div class="mb-3">
<input type="password"
name="password"
class="form-control"
placeholder="Password"
required>
</div>

<div class="d-flex justify-content-between mb-3 remember">

<div>
<input type="checkbox"> Remember me
</div>

<div>
<a href="{% url 'accounts:password_reset' %}">
Forgot password?
</a>
</div>

</div>

<button class="btn btn-success w-100 mb-3">
Sign in
</button>

</form>

<div class="divider">
or continue with
</div>

<button class="btn social-btn w-100 mb-2">
<i class="bi bi-google me-2"></i>
Sign in with Google
</button>

<button class="btn social-btn w-100 mb-2">
<i class="bi bi-github me-2"></i>
Sign in with Github
</button>

<button class="btn social-btn w-100 mb-2">
<i class="bi bi-apple me-2"></i>
Sign in with Apple
</button>

<hr>

<p>
New to Bluohm?
<a href="{% url 'accounts:register' %}">
Create account
</a>
</p>

</div>

</div>

</body>
</html>

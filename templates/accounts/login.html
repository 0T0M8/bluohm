<!DOCTYPE html>
<html>
<head>
   <meta name="theme-color" content="#0B1120">
 
   <title>Bluohm | Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .login-card {
            background: #1e293b;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .btn-success {
            background: #22c55e;
            border: none;
        }

        .btn-success:hover {
            background: #16a34a;
        }
    </style>

</head>

<body>

<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">

    <div class="col-md-5">

        <div class="login-card">

            <h2 class="text-center mb-4">Login to Bluohm</h2>

            <!-- Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Username"
                           required>
                </div>

                <div class="mb-3">
                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Password"
                           required>
                </div>

                <button type="submit" class="btn btn-success w-100">
                    Login
                </button>

            </form>

            <div class="mt-3 text-center">
                <a href="{% url 'accounts:password_reset' %}">
                    Forgot Password?
                </a>
            </div>

            <hr>

            <p class="text-center">
                Don't have an account?
                <a href="{% url 'accounts:register' %}">
                    Register
                </a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
